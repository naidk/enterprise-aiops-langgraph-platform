[pytest]
# ── Discovery ─────────────────────────────────────────────────────────────────
testpaths     = tests
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ────────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=app
    --cov=agents
    --cov=graph
    --cov=services
    --cov-report=term-missing
    --cov-fail-under=0

# ── Async ─────────────────────────────────────────────────────────────────────
asyncio_mode = auto

# ── Custom markers ────────────────────────────────────────────────────────────
markers =
    unit:        Pure unit tests — no external I/O
    integration: End-to-end tests using real graph + services (no mocks)
    regression:  Regression tests for persistence and business logic
    slow:        Tests that take more than 2 seconds
