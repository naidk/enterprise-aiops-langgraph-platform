[pytest]
# ── Discovery ─────────────────────────────────────────────────────────────────
testpaths     = tests
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ────────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers

# ── Async ─────────────────────────────────────────────────────────────────────
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# ── Custom markers ────────────────────────────────────────────────────────────
markers =
    unit:        Pure unit tests — no external I/O
    integration: End-to-end tests using real graph + services (no mocks)
    regression:  Regression tests for persistence and business logic
    slow:        Tests that take more than 2 seconds
